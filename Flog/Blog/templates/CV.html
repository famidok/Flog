{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CV</title>
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>
<body>
    <nav>
        <a href="{% url 'welcome' %}" class="back-button">
            <button type="button">Back to Home</button>
        </a>
    </nav>
    <div class="resume-wrapper">
        {% if user_info.cv_file %}
            <embed
                src="{{ user_info.cv_file.url }}"
                type="application/pdf"
                class="cv-viewer"
            />
        {% else %}
            <p>CV not found.</p>
        {% endif %}
    </div>
</body>
</html>
